<body>

  <h1>🌍 Flaggquiz</h1>

  <img id="flag" src="" alt="Flagga">

  <div class="answers" id="answers"></div>

<button id="next-btn" onclick="nextQuestion()">Nästa fråga</button>

  <script>
    const allCountries = [
      { name: "Sverige", flag: "https://flagcdn.com/w320/se.png" },
      { name: "Norge", flag: "https://flagcdn.com/w320/no.png" },
      { name: "Danmark", flag: "https://flagcdn.com/w320/dk.png" },
      { name: "Finland", flag: "https://flagcdn.com/w320/fi.png" },
      { name: "Tyskland", flag: "https://flagcdn.com/w320/de.png" },
      { name: "Frankrike", flag: "https://flagcdn.com/w320/fr.png" },
      { name: "Italien", flag: "https://flagcdn.com/w320/it.png" },
      { name: "Spanien", flag: "https://flagcdn.com/w320/es.png" },
      { name: "USA", flag: "https://flagcdn.com/w320/us.png" },
      { name: "Japan", flag: "https://flagcdn.com/w320/jp.png" }
    ];

    let countries = [];
    let currentCountry;
    let hasGuessed = false;

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      countries = shuffle([...allCountries]);
    }

    function getNextCountry() {
      if (countries.length === 0) {
        countries = shuffle([...allCountries]);
      }
      return countries.pop();
    }

    function loadQuestion() {
      hasGuessed = false;

      currentCountry = getNextCountry();
      document.getElementById("flag").src = currentCountry.flag;

      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";

      let options = [currentCountry.name];

      while (options.length < 4) {
        const random = allCountries[Math.floor(Math.random() * allCountries.length)].name;
        if (!options.includes(random)) {
          options.push(random);
        }
      }

      options = shuffle(options);

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.classList.add("answer-btn");

        btn.onclick = () => handleGuess(option, btn);

        answersDiv.appendChild(btn);
      });

      document.getElementById("next-btn").style.display = "none";
    }

    function handleGuess(selected, button) {
      if (hasGuessed) return;

      hasGuessed = true;

      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => {
        btn.disabled = true;

        if (btn.innerText === currentCountry.name) {
          btn.classList.add("correct");
        } else if (btn.innerText === selected) {
          btn.classList.add("wrong");
        }
      });

      document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
      loadQuestion();
    }

    initGame();
    loadQuestion();
  </script>

</body>
</html>
