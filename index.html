<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Flag Quiz - Europa</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: white;
}
.container {
  background: #ffffff10;
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: 0.3s;
}
.correct { animation: correctAnim 0.7s; }
@keyframes correctAnim { 0%{transform:scale(1);background:#00ff8820;}50%{transform:scale(1.05);}100%{transform:scale(1);} }
.wrong { animation: shake 0.7s; }
@keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-5px);}50%{transform:translateX(5px);}75%{transform:translateX(-5px);}100%{transform:translateX(0);} }
#timer { font-size: 22px; margin-bottom: 10px; font-weight: bold; }
.warning { color:#ff4d4d; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }
#progress-container { background:#ffffff30; border-radius:10px; width:100%; height:15px; margin-bottom:15px; }
#progress-bar { background:#00c6ff; height:100%; width:0%; border-radius:10px; transition:0.3s; }
img { width:180px; border-radius:10px; margin:15px 0; }
input { padding:10px; width:80%; border-radius:10px; border:none; outline:none; }
button { margin-top:15px; padding:10px 20px; border:none; border-radius:10px; background:#00c6ff; color:white; cursor:pointer; }
button:hover { background:#0072ff; }
#result { margin-top:15px; font-weight:bold; }
#score { margin-top:10px; font-size:18px; }
#ranking { text-align:left; margin-top:15px; }
</style>
</head>
<body>

<div class="container" id="card">
  <h1>🌍 Flag Quiz</h1>
  <div id="timer">Tid kvar: 50</div>
  <div id="progress-container"><div id="progress-bar"></div></div>
  <img id="flag">
  <input id="answer" placeholder="Vilket land?">
  <br>
  <button onclick="checkAnswer()">Skicka</button>
  <p id="result"></p>
  <p id="score"></p>
  <div id="ranking"></div>
</div>

<script>
// Europa-länder och namn
const countryCodes = [
"se","no","fi","dk","is","fr","de","it","es","pt",
"nl","be","lu","pl","cz","sk","hu","at","ch",
"gr","tr","ee","lv","lt","ie","gb","ua","by",
"md","ro","bg","hr","si","rs","ba","me","mk","al","xk"
];

const countryNames = {
se: { sv: "Sverige", en: "Sweden" }, no: { sv: "Norge", en: "Norway" }, fi: { sv: "Finland", en: "Finland" },
dk: { sv: "Danmark", en: "Denmark" }, is: { sv: "Island", en: "Iceland" }, fr: { sv: "Frankrike", en: "France" },
de: { sv: "Tyskland", en: "Germany" }, it: { sv: "Italien", en: "Italy" }, es: { sv: "Spanien", en: "Spain" },
pt: { sv: "Portugal", en: "Portugal" }, nl: { sv: "Nederländerna", en: "Netherlands" }, be: { sv: "Belgien", en: "Belgium" },
lu: { sv: "Luxemburg", en: "Luxembourg" }, pl: { sv: "Polen", en: "Poland" }, cz: { sv: "Tjeckien", en: "Czech Republic" },
sk: { sv: "Slovakien", en: "Slovakia" }, hu: { sv: "Ungern", en: "Hungary" }, at: { sv: "Österrike", en: "Austria" },
ch: { sv: "Schweiz", en: "Switzerland" }, gr: { sv: "Grekland", en: "Greece" }, tr: { sv: "Turkiet", en: "Turkey" },
ee: { sv: "Estland", en: "Estonia" }, lv: { sv: "Lettland", en: "Latvia" }, lt: { sv: "Litauen", en: "Lithuania" },
ie: { sv: "Irland", en: "Ireland" }, gb: { sv: "Storbritannien", en: "United Kingdom" }, ua: { sv: "Ukraina", en: "Ukraine" },
by: { sv: "Belarus", en: "Belarus" }, md: { sv: "Moldavien", en: "Moldova" }, ro: { sv: "Rumänien", en: "Romania" },
bg: { sv: "Bulgarien", en: "Bulgaria" }, hr: { sv: "Kroatien", en: "Croatia" }, si: { sv: "Slovenien", en: "Slovenia" },
rs: { sv: "Serbien", en: "Serbia" }, ba: { sv: "Bosnien och Hercegovina", en: "Bosnia and Herzegovina" },
me: { sv: "Montenegro", en: "Montenegro" }, mk: { sv: "Nordmakedonien", en: "North Macedonia" },
al: { sv: "Albanien", en: "Albania" }, xk: { sv: "Kosovo", en: "Kosovo" }
};

let roundCountries=[], currentIndex=0, currentCountry, score=0, timeLeft=50, timerInterval;
let players=[];

function shuffle(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]];}}

function startNewRound(){
  const temp=[...countryCodes]; shuffle(temp); roundCountries=temp.slice(0,20);
  currentIndex=0; score=0;
  document.getElementById("flag").style.display="";
  document.getElementById("answer").style.display="";
  document.getElementById("timer").style.display="";
  document.getElementById("ranking").innerHTML="";
  updateProgress();
}

function startTimer(){
  timeLeft=50;
  const timerEl=document.getElementById("timer");
  timerEl.textContent="Tid kvar: "+timeLeft;
  timerInterval=setInterval(()=>{
    timeLeft--;
    timerEl.textContent="Tid kvar: "+timeLeft;
    if(timeLeft<=10) timerEl.classList.add("warning");
    if(timeLeft>10) timerEl.classList.remove("warning");
    if(timeLeft<=0){clearInterval(timerInterval); timeUp();}
  },1000);
}

function loadFlag(){
  if(currentIndex>=roundCountries.length){ endGame(); return; }
  const code=roundCountries[currentIndex]; currentCountry={name:countryNames[code],flag:`https://flagcdn.com/w320/${code}.png`};
  currentIndex++;
  document.getElementById("flag").src=currentCountry.flag;
  document.getElementById("answer").value="";
  document.getElementById("result").textContent="";
  document.getElementById("timer").classList.remove("warning");
  updateProgress();
  startTimer();
}

function updateProgress(){
  const percent=(currentIndex/roundCountries.length)*100;
  document.getElementById("progress-bar").style.width=percent+"%";
}

function checkAnswer(){
  clearInterval(timerInterval);
  const input=document.getElementById("answer").value.toLowerCase();
  const correctSv=currentCountry.name.sv.toLowerCase();
  const correctEn=currentCountry.name.en.toLowerCase();
  const card=document.getElementById("card");
  if(input===correctSv||input===correctEn){ document.getElementById("result").textContent="✅ Rätt!"; score++; card.classList.add("correct"); }
  else{ document.getElementById("result").textContent=`❌ Fel! Rätt svar: ${currentCountry.name.sv} (${currentCountry.name.en})`; card.classList.add("wrong"); }
  setTimeout(()=>{ card.classList.remove("correct","wrong"); loadFlag(); },2000);
}

function timeUp(){
  document.getElementById("result").textContent=`⏱ Tiden är slut! Rätt svar: ${currentCountry.name.sv} (${currentCountry.name.en})`;
  setTimeout(loadFlag,2000);
}

function endGame(){
  document.getElementById("flag").style.display="none";
  document.getElementById("answer").style.display="none";
  document.getElementById("timer").style.display="none";
  document.getElementById("result").textContent="";
  document.getElementById("score").textContent=`🎉 Du fick ${score} av 20`;

  let playerName=prompt("Ditt namn för rankingen:")||"Spelare";
  players.push({name:playerName,score:score});
  players.sort((a,b)=>b.score-a.score);
  if(players.length>20) players=players.slice(0,20);

  let rankingHTML="<h3>🏆 Ranking</h3><ol>";
  players.forEach(p=>{ rankingHTML+=`<li>${p.name} - ${p.score}/20 poäng</li>`; });
  rankingHTML+="</ol>";
  document.getElementById("ranking").innerHTML=rankingHTML;

  const btn=document.createElement("button");
  btn.textContent="🔄 Spela igen";
  btn.onclick=()=>startNewRound()||loadFlag();
  document.getElementById("ranking").appendChild(btn);
}

startNewRound();
loadFlag();
</script>

</body>
</html>
